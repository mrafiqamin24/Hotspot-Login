    <script>
      // Back sound error: bunyi cyber error.
      // Beberapa browser memblokir autoplay, jadi suara juga dipancing saat user klik layar.
      function playErrorSound() {
        try {
          var AudioContext = window.AudioContext || window.webkitAudioContext;
          var audio = new AudioContext();
          var gain = audio.createGain();
          gain.gain.value = 0.22;
          gain.connect(audio.destination);

          [180, 92, 240, 60].forEach(function (freq, index) {
            var osc = audio.createOscillator();
            osc.type = index % 2 ? "square" : "sawtooth";
            osc.frequency.value = freq;
            osc.connect(gain);
            osc.start(audio.currentTime + index * 0.09);
            osc.stop(audio.currentTime + index * 0.09 + 0.18);
          });
        } catch (e) {}
      }

      window.addEventListener("load", function () {
        playErrorSound();
        document.addEventListener("pointerdown", playErrorSound, {
          once: true,
        });
      });
    </script>
